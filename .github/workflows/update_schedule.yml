name: Actualizar programación PVPC

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests python-dotenv

      - name: Consultar ESIOS y guardar schedule.json
        env:
          ESIOS_TOKEN:   ${{ secrets.ESIOS_TOKEN }}
          HORAS_BARATAS: ${{ vars.HORAS_BARATAS || '4' }}
          TEMP_OBJETIVO: ${{ vars.TEMP_OBJETIVO  || '55' }}
          GEO_ID:        ${{ vars.GEO_ID          || '8741' }}
        run: python update_schedule.py

      - name: Commit schedule.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.json
          git diff --staged --quiet || git commit -m "chore: update schedule $(date +'%Y-%m-%d')"
          git push
